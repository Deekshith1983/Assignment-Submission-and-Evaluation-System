<!DOCTYPE html>
<html>
<head>
  <title>Submit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Poppins'; margin: 0; background: #f1f5f9; }

    .navbar { background: #0f172a; padding: 15px 40px; }
    .navbar a { color: white; margin-right: 25px; text-decoration: none; }

    .container { width: 85%; margin: auto; padding: 40px 0; }

    .hero {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .flex {
      display: flex;
      gap: 20px;
    }

    .card {
      width: 50%;
      background: white;
      padding: 40px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
    }

    footer { text-align: center; padding: 20px; margin-top: 30px; }
  </style>
</head>

<body>

<div class="navbar">
  <a href="dashboard.html">Home</a>
  <a href="submit.html">Submit</a>
  <a href="submissions.html">Submissions</a>
  <a href="results.html">Results</a>
</div>

<div class="container">

  <div class="hero">
    <h2>Submit Your Assignment</h2>
  </div>

  <div class="flex">

    <div class="card">
      <form id="form">
        <input id="name" placeholder="Name" required>
        <input id="studentId" placeholder="Student ID" required>
        <input id="email" placeholder="Email" required>
        <input id="title" placeholder="Assignment Title" required>
        <button type="submit">Submit</button>
      </form>
    </div>

    <div class="card">
      <h3>Upload File</h3>
      <input type="file" id="file">
    </div>

  </div>

</div>

<footer>Submit Page</footer>

</body>
</html>
