<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="My Submissions - View all your submitted assignments.">
  <title>My Submissions</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <div class="navbar">
    <div class="navbar-title">📚 Student Portal</div>
    <div>
      <a href="dashboard.html">Home</a>
      <a href="submit.html">Submit</a>
      <a href="submissions.html">Submissions</a>
      <a href="results.html">Results</a>
    </div>
  </div>

  <div class="container">

    <div class="hero">
      <h1>My Submissions</h1>
      <p>View all your submitted assignments</p>
    </div>

    <div id="message"></div>

    <div class="white-card">
      <input type="text" id="studentIdInput" placeholder="Enter your Student ID" class="max-w-300 inline-block">
      <button onclick="loadSubmissions()" class="btn ml-10">Search</button>
    </div>

    <div class="white-card">
      <table id="submissionsTable">
        <thead>
          <tr>
            <th>Assignment Title</th>
            <th>Upload Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="submissionTableBody">
          <tr>
            <td colspan="4" class="text-center text-gray p-30">Enter your Student ID and search
              to view submissions</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <footer>
    <p>&copy; 2026 Assignment System</p>
  </footer>

  <script src="submissions.js"></script>

</body>

</html>
