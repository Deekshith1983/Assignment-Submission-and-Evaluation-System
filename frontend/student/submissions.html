<!DOCTYPE html>
<html>
<head>
  <title>Submissions</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins';
      margin: 0;
      background: #f1f5f9;

      /* 🔥 FIX */
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      background: #0f172a;
      padding: 15px 40px;
    }

    .navbar a {
      color: white;
      margin-right: 25px;
      text-decoration: none;
    }

    .container {
      width: 85%;
      margin: auto;
      padding: 40px 0;

      /* 🔥 THIS PUSHES FOOTER DOWN */
      flex: 1;
      text-align: center;
    }

    h2 {
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      width: 400px;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    button {
      padding: 15px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 15px;
      text-align: center;
    }

    th {
      background: #e2e8f0;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #f1f5f9;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="dashboard.html">Home</a>
  <a href="submit.html">Submit</a>
  <a href="submissions.html">Submissions</a>
  <a href="results.html">Results</a>
</div>

<div class="container">

  <h2>My Submissions</h2>

  <div class="search-box">
    <input placeholder="Enter Student ID">
    <button>Search</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Assignment</th>
        <th>Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody>
      <!-- EMPTY -->
    </tbody>
  </table>

</div>

<footer>Submissions Page</footer>

</body>
</html>
