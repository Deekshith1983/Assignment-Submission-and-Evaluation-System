<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins'; margin: 0; background: #f1f5f9; }

    .navbar {
      background: #0f172a;
      padding: 15px 40px;
    }
    .navbar a {
      color: white;
      margin-right: 25px;
      text-decoration: none;
    }

    .container { width: 85%; margin: auto; padding: 40px 0; }

    .hero {
      background: white;
      padding: 50px;
      border-radius: 12px;
      margin-bottom: 30px;
    }

    .hero button {
      margin-top: 15px;
      padding: 14px 25px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 40px;
      text-align: center;
      border-radius: 12px;
      cursor: pointer;
    }

    table {
      width: 100%;
      background: white;
      border-radius: 12px;
      padding: 20px;
    }

    th, td { padding: 12px; text-align: center; }

    footer {
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      color: #555;
    }
  </style>
</head>

<body>

<div class="navbar">
  <a href="dashboard.html">Home</a>
  <a href="submit.html">Submit</a>
  <a href="submissions.html">Submissions</a>
  <a href="results.html">Results</a>
</div>

<div class="container">

  <div class="hero">
    <h2>Welcome Student 👋</h2>
    <p>Submit & track your assignments easily</p>
    <button onclick="location.href='submit.html'">Submit Assignment</button>
  </div>

  <div class="actions">
    <div class="card" onclick="location.href='submit.html'">Submit Assignment</div>
    <div class="card" onclick="location.href='results.html'">View Results</div>
  </div>

  <table>
    <thead>
      <tr>
        <th>Assignment</th>
        <th>Status</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <!-- EMPTY UNTIL DATA -->
    </tbody>
  </table>

</div>

<footer>Student Dashboard</footer>

</body>
</html>
