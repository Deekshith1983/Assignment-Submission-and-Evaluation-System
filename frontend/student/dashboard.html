<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f1f5f9;
    }

    .navbar {
      background: #0f172a;
      color: white;
      padding: 18px 40px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      width: 85%;
      margin: auto;
      padding: 40px 0;
    }

    /* 🔥 BIG WELCOME BOX */
    .welcome {
      background: white;
      padding: 60px 40px;
      border-radius: 16px;
      margin-bottom: 30px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    }

    .welcome h1 {
      font-size: 34px;
      margin: 0;
    }

    .welcome p {
      font-size: 18px;
      margin-top: 10px;
      color: #555;
    }

    /* 🔥 BIG ACTION CARDS */
    .actions {
      display: flex;
      gap: 30px;
    }

    .action-card {
      flex: 1;
      background: white;
      padding: 70px 20px;
      border-radius: 18px;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      transition: 0.3s;
    }

    .action-card:hover {
      transform: translateY(-8px);
      background: #eff6ff;
    }

    .icon {
      font-size: 60px;
    }

    .action-card h3 {
      margin-top: 20px;
      font-size: 22px;
    }

  </style>
</head>

<body>

<div class="navbar">Student Dashboard</div>

<div class="container">

  <!-- 🔥 WELCOME -->
  <div class="welcome">
    <h1>Welcome Student 👋</h1>
    <p>Manage your assignments and track your performance easily.</p>
  </div>

  <!-- 🔥 ACTIONS -->
  <div class="actions">

    <div class="action-card" onclick="goToSubmit()">
      <div class="icon">📄</div>
      <h3>Submit Assignment</h3>
    </div>

    <div class="action-card" onclick="goToSubmissions()">
      <div class="icon">📂</div>
      <h3>View Submissions</h3>
    </div>

    <div class="action-card" onclick="goToResults()">
      <div class="icon">📊</div>
      <h3>View Results</h3>
    </div>

  </div>

</div>

<script>
function goToSubmit() {
  window.location.href = "submit.html";
}

function goToSubmissions() {
  window.location.href = "submissions.html";
}

function goToResults() {
  window.location.href = "results.html";
}
</script>

</body>
</html>
