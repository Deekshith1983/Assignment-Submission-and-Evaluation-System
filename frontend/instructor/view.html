<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View Assignments - Search and evaluate student submissions.">
  <title>View & Evaluate Assignments</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

  <div class="navbar">
    <div class="navbar-title">👨‍🏫 Instructor Portal</div>
    <div>
      <a href="dashboard.html">Home</a>
      <a href="view.html">View Assignments</a>
      <a href="analytics.html">Analytics</a>
    </div>
  </div>

  <div class="container">

    <div class="hero">
      <h1>View Student Assignments</h1>
      <p>Search for student submissions and evaluate their work</p>
    </div>

    <div id="message"></div>

    <div class="white-card">
      <input type="text" id="studentId" placeholder="Enter Student ID" class="max-w-300 inline-block">
      <button onclick="fetchAssignments()" class="btn ml-10">Search</button>
    </div>

    <div class="white-card">
      <table id="assignmentsTable">
        <thead>
          <tr>
            <th>Assignment Title</th>
            <th>Upload Date</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="assignmentTableBody">
          <tr>
            <td colspan="4" class="text-center p-30 text-gray">Enter a Student ID and search to
              view assignments</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <footer>
    <p>&copy; 2026 Assignment System</p>
  </footer>

  <script src="view.js"></script>

</body>

</html>
